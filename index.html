<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Lua Encryptor</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  width: 90%;
  max-width: 600px;
  text-align: center;
}
.file-btn {
  border: 2px dashed #fff;
  padding: 20px;
  cursor: pointer;
  margin-bottom: 20px;
}
input[type="file"] { display: none; }

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #000;
  color: #fff;
  border: 1px solid #fff;
}

button { cursor: pointer; }

.loading {
  display: none;
  margin-top: 20px;
}

.spinner {
  border: 4px solid #fff;
  border-top: 4px solid transparent;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

textarea {
  width: 100%;
  height: 150px;
  margin-top: 20px;
  background: #000;
  color: #0f0;
  border: 1px solid #fff;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Roblox Lua Encryptor 🔐</h2>

  <label class="file-btn">
    [+] Select File
    <input type="file" id="fileInput">
  </label>

  <select id="fileType">
    <option>.lua</option>
    <option>.txt</option>
    <option>.py</option>
    <option>.js</option>
  </select>

  <select id="mode">
    <option>Devil</option>
    <option>Extreme</option>
    <option>Hard</option>
    <option>Medium</option>
    <option>Perfect</option>
  </select>

  <button onclick="processFile()">Encrypt & Obfuscate</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <textarea id="output" placeholder="Hasil muncul di sini..."></textarea>
</div>

<script>
let fileContent = "";

document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    fileContent = e.target.result;
  };
  reader.readAsText(file);
});

function randomString(length) {
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let result = "";
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

// XOR encrypt
function xorEncrypt(text, key) {
  let result = "";
  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(
      text.charCodeAt(i) ^ key.charCodeAt(i % key.length)
    );
  }
  return btoa(result);
}

// Obfuscate
function obfuscate(code, level) {
  let intensity = {
    "Medium": 1,
    "Hard": 2,
    "Extreme": 3,
    "Devil": 4,
    "Perfect": 5
  }[level] || 1;

  let output = code;

  for (let i = 0; i < intensity; i++) {
    output = output.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, function(match) {
      if (Math.random() > 0.6) {
        return randomString(10);
      }
      return match;
    });
  }

  return output;
}

// ROBLOX SAFE LOADER
function generateLoader(data, key) {
return `local k="${key}"
local d="${data}"

local function bxor(a,b)
    local res = 0
    local bit = 1
    while a > 0 or b > 0 do
        local abit = a % 2
        local bbit = b % 2
        if abit ~= bbit then
            res = res + bit
        end
        a = math.floor(a / 2)
        b = math.floor(b / 2)
        bit = bit * 2
    end
    return res
end

local function decode(data)
    local decoded = game:GetService("HttpService"):Base64Decode(data)
    local result = ""

    for i = 1, #decoded do
        local c = string.byte(decoded, i)
        local kbyte = string.byte(k, ((i-1) % #k) + 1)
        result = result .. string.char(bxor(c, kbyte))
    end

    return result
end

loadstring(decode(d))()
`;
}

function processFile() {
  if (!fileContent) {
    alert("Pilih file dulu!");
    return;
  }

  const mode = document.getElementById("mode").value;
  const loading = document.getElementById("loading");
  const outputArea = document.getElementById("output");

  loading.style.display = "block";
  outputArea.value = "";

  setTimeout(() => {
    const key = randomString(16);
    const obf = obfuscate(fileContent, mode);
    const encrypted = xorEncrypt(obf, key);
    const finalCode = generateLoader(encrypted, key);

    loading.style.display = "none";
    outputArea.value = finalCode;
  }, 1500);
}
</script>

</body>
</html>
